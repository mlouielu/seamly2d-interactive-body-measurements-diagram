<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seamly2D Interactive Body Measurements Diagram</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      min-height: 72px;
      box-sizing: border-box;
      padding: 10px 16px;
      border-bottom: 1px solid #ddd;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .title-block {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 18px;
    }

    p {
      margin: 4px 0 0;
      color: #555;
      font-size: 14px;
    }

    .links {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .github-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 999px;
      background: white;
      color: #24292f;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    .github-badge:hover {
      background: #f0f0f0;
    }

    .github-icon {
      width: 16px;
      height: 16px;
      display: inline-block;
      vertical-align: middle;
    }

    .status-bar {
      height: 36px;
      box-sizing: border-box;
      padding: 0 16px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #555;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }

    .status-bar .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .status-bar.is-hovered .status-dot { background: #f59e0b; }
    .status-bar.is-copied .status-dot  { background: #0a8f45; }

    .status-bar .status-label {
      font-weight: 600;
      color: #111;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .status-bar .status-var {
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
      font-size: 12px;
      color: #555;
      background: #f0f0f0;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 1px 5px;
      flex-shrink: 0;
      display: none;
    }

    .status-bar.is-hovered .status-var,
    .status-bar.is-copied  .status-var { display: inline; }

    .status-bar .status-sep {
      color: #ccc;
      flex-shrink: 0;
      display: none;
    }

    .status-bar.is-hovered .status-sep,
    .status-bar.is-copied  .status-sep { display: inline; }

    .status-bar .status-hint {
      color: #999;
      font-size: 12px;
      flex-shrink: 0;
    }

    .status-bar.is-copied .status-hint {
      color: #0a8f45;
      font-weight: 600;
    }

    .viewer {
      flex: 1;
      min-height: 0;
      overflow: auto;
      background: #f3f3f3;
      position: relative;
    }

    object {
      display: block;
      width: 3003px;
      height: 6402px;
      border: 0;
      background: white;
    }

    @media (max-width: 760px) {
      header {
        min-height: unset;
        padding: 5px 10px;
        gap: 8px;
      }

      h1 {
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      p {
        display: none;
      }

      .github-label {
        display: none;
      }

      .github-badge {
        padding: 5px 7px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="title-block">
      <h1>Seamly2D Interactive Body Measurements Diagram</h1>
      <p>
        By Louie Lu
        (<a href="https://github.com/mlouielu">@mlouielu</a>).
        Hover measurements to highlight lines. Click a measurement to copy its variable name.
      </p>
    </div>

    <div class="links">
      <a
        class="github-badge"
        href="https://github.com/mlouielu/seamly2d-interactive-body-measurements-diagram"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="View source on GitHub">
        <svg class="github-icon" viewBox="0 0 16 16" aria-hidden="true">
          <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
          0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52
          -.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2
          -3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21
          2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82
          2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15
          0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
          0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013
          8.013 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/>
        </svg>
        <span class="github-label">GitHub</span>
      </a>
    </div>
  </header>
  <div class="status-bar" id="statusBar" aria-live="polite" aria-atomic="true">
    <span class="status-dot"></span>
    <span class="status-label" id="statusLabel"></span>
    <span class="status-var" id="statusVar"></span>
    <span class="status-sep">·</span>
    <span class="status-hint" id="statusHint">Hover or tap a measurement</span>
  </div>
  <main class="viewer">
    <object
      type="image/svg+xml"
      data="./Seamly2d-interactive-body-measurements.svg"
      aria-label="Interactive Seamly2D body measurements diagram">
      <p>
        Your browser could not load the SVG.
        <a href="./Seamly2d-interactive-body-measurements.svg">Open it directly</a>.
      </p>
    </object>
  </main>
  <script>
  (function () {
    const statusBar   = document.getElementById('statusBar');
    const statusLabel = document.getElementById('statusLabel');
    const statusVar   = document.getElementById('statusVar');
    const statusHint  = document.getElementById('statusHint');
    const obj         = document.querySelector('object');

    const DEFAULT_HINT = 'Hover or tap a measurement';
    const COPY_HINT    = '✓ Copied!';

    let copyTimer  = null;
    let savedState = { state: null, label: '', variable: '', hint: DEFAULT_HINT };

    function applyState(s) {
      savedState = s;
      statusBar.className     = 'status-bar' + (s.state ? ' is-' + s.state : '');
      statusLabel.textContent = s.label    || '';
      statusVar.textContent   = s.variable || '';
      statusHint.textContent  = s.hint     || DEFAULT_HINT;
    }

    function showCopied() {
      if (copyTimer) clearTimeout(copyTimer);
      statusBar.classList.remove('is-hovered');
      statusBar.classList.add('is-copied');
      statusHint.textContent = COPY_HINT;
      copyTimer = setTimeout(function () { applyState(savedState); }, 1600);
    }

    function bridge(doc) {
      function infoFor(el, code) {
        const label    = el.getAttribute('data-measure-label') || code;
        const variable = el.getAttribute('data-measure-var') ||
          (label.match(/\(([^()]+)\)\s*$/) || [])[1] || '';
        return { label, variable };
      }

      function codesFor(el) {
        const raw = el.getAttribute('data-measures') || el.getAttribute('data-measure') || '';
        return raw.trim().split(/\s+/).filter(Boolean);
      }

      doc.querySelectorAll('.measure-definition, .measure-target').forEach(function (el) {
        const codes = codesFor(el);
        if (!codes.length) return;
        const code = codes[0];

        el.addEventListener('mouseenter', function () {
          const { label, variable } = infoFor(el, code);
          applyState({ state: 'hovered', label, variable, hint: 'Click to copy variable' });
        });

        el.addEventListener('mouseleave', function () {
          applyState({ state: null, label: '', variable: '', hint: DEFAULT_HINT });
        });

        el.addEventListener('click', function (evt) {
          evt.stopPropagation();
          const { label, variable } = infoFor(el, code);
          applyState({ state: 'hovered', label, variable, hint: 'Click to copy variable' });
          showCopied();
        });
      });
    }

    function tryBridge() {
      try {
        const doc = obj.contentDocument;
        if (doc && doc.readyState === 'complete' && doc.querySelector('.measure-definition')) {
          bridge(doc);
          return;
        }
      } catch (e) {}
      setTimeout(tryBridge, 200);
    }

    obj.addEventListener('load', function () { setTimeout(tryBridge, 100); });
    // Fallback if load already fired
    setTimeout(tryBridge, 500);
  })();

  (function () {
    if (!('ontouchstart' in window)) return;

    var SVG_W = 3003, SVG_H = 6402;
    var viewer = document.querySelector('.viewer');
    var obj    = document.querySelector('object');

    // Switch viewer to a fixed canvas; object becomes absolutely positioned
    viewer.style.overflow = 'hidden';
    obj.style.position     = 'absolute';
    obj.style.top          = '0';
    obj.style.left         = '0';
    obj.style.width        = SVG_W + 'px';
    obj.style.height       = SVG_H + 'px';
    obj.style.transformOrigin = '0 0';

    var scale = 1, tx = 0, ty = 0;

    function initFit() {
      scale = Math.min(viewer.clientWidth / SVG_W, viewer.clientHeight / SVG_H);
      tx = 0;
      ty = 0;
      commit();
    }

    function clamp() {
      var sw = SVG_W * scale, sh = SVG_H * scale;
      var vw = viewer.clientWidth,  vh = viewer.clientHeight;
      var pad = 40;
      tx = Math.min(vw - pad, Math.max(pad - sw, tx));
      ty = Math.min(vh - pad, Math.max(pad - sh, ty));
    }

    function commit() {
      obj.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + scale + ')';
    }

    initFit();

    // Transparent overlay captures all touch events
    var overlay = document.createElement('div');
    overlay.style.cssText = 'position:absolute;inset:0;z-index:5;touch-action:none;';
    viewer.appendChild(overlay);

    var ptrs = {};
    var panStartX, panStartY, panStartTx, panStartTy;
    var pinchDist0 = 0, pinchScale0 = 1, pinchTx0 = 0, pinchTy0 = 0, pinchCx = 0, pinchCy = 0;
    var tapX, tapY, tapTime;

    function viewerPos(touch) {
      var r = viewer.getBoundingClientRect();
      return { x: touch.clientX - r.left, y: touch.clientY - r.top };
    }

    function dist2(a, b) { var dx = a.x - b.x, dy = a.y - b.y; return Math.sqrt(dx*dx + dy*dy); }
    function mid(a, b)   { return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 }; }

    overlay.addEventListener('touchstart', function (e) {
      e.preventDefault();
      Array.from(e.changedTouches).forEach(function (t) { ptrs[t.identifier] = viewerPos(t); });
      var ids = Object.keys(ptrs);
      if (ids.length === 1) {
        var p = ptrs[ids[0]];
        panStartX = p.x; panStartY = p.y; panStartTx = tx; panStartTy = ty;
        tapX = p.x; tapY = p.y; tapTime = Date.now();
      } else if (ids.length === 2) {
        var pts = [ptrs[ids[0]], ptrs[ids[1]]];
        pinchDist0  = dist2(pts[0], pts[1]);
        pinchScale0 = scale;
        pinchTx0 = tx; pinchTy0 = ty;
        var c = mid(pts[0], pts[1]);
        pinchCx = c.x; pinchCy = c.y;
      }
    }, { passive: false });

    overlay.addEventListener('touchmove', function (e) {
      e.preventDefault();
      Array.from(e.changedTouches).forEach(function (t) { ptrs[t.identifier] = viewerPos(t); });
      var ids = Object.keys(ptrs);
      if (ids.length === 1) {
        var p = ptrs[ids[0]];
        tx = panStartTx + (p.x - panStartX);
        ty = panStartTy + (p.y - panStartY);
        clamp(); commit();
      } else if (ids.length >= 2) {
        var pts = [ptrs[ids[0]], ptrs[ids[1]]];
        var d = dist2(pts[0], pts[1]);
        var newScale = Math.min(4, Math.max(0.15, pinchScale0 * (d / pinchDist0)));
        // Zoom around the original pinch center
        tx = pinchCx - (pinchCx - pinchTx0) * (newScale / pinchScale0);
        ty = pinchCy - (pinchCy - pinchTy0) * (newScale / pinchScale0);
        scale = newScale;
        clamp(); commit();
      }
    }, { passive: false });

    overlay.addEventListener('touchend', function (e) {
      e.preventDefault();
      var changed = Array.from(e.changedTouches);
      var wasSingle = Object.keys(ptrs).length === 1;
      changed.forEach(function (t) { delete ptrs[t.identifier]; });

      if (wasSingle && changed.length === 1) {
        var p = viewerPos(changed[0]);
        var moved = dist2(p, { x: tapX, y: tapY });
        if (moved < 10 && Date.now() - tapTime < 400) forwardTap(tapX, tapY);
      }

      // Re-anchor pan if one finger remains
      var rem = Object.keys(ptrs);
      if (rem.length === 1) {
        var rp = ptrs[rem[0]];
        panStartX = rp.x; panStartY = rp.y; panStartTx = tx; panStartTy = ty;
      }
    }, { passive: false });

    overlay.addEventListener('touchcancel', function (e) {
      Array.from(e.changedTouches).forEach(function (t) { delete ptrs[t.identifier]; });
    });

    function forwardTap(vx, vy) {
      // Map visual viewer coords → SVG document coords
      var docX = (vx - tx) / scale;
      var docY = (vy - ty) / scale;
      try {
        var doc = obj.contentDocument;
        if (!doc) return;
        var el = doc.elementFromPoint(docX, docY);
        while (el && el !== doc.documentElement) {
          if (el.classList &&
              (el.classList.contains('measure-definition') ||
               el.classList.contains('measure-target'))) {
            el.dispatchEvent(new MouseEvent('mouseenter', { bubbles: true }));
            el.dispatchEvent(new MouseEvent('click',      { bubbles: true }));
            return;
          }
          el = el.parentElement;
        }
      } catch (err) {}
    }
  })();
  </script>
</body>
</html>
