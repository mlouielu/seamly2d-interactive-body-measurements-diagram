<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seamly2D Interactive Body Measurements Diagram</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    header {
      min-height: 72px;
      box-sizing: border-box;
      padding: 10px 16px;
      border-bottom: 1px solid #ddd;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .title-block {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 18px;
    }

    p {
      margin: 4px 0 0;
      color: #555;
      font-size: 14px;
    }

    .links {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .github-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 999px;
      background: white;
      color: #24292f;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    .github-badge:hover {
      background: #f0f0f0;
    }

    .github-icon {
      width: 16px;
      height: 16px;
      display: inline-block;
      vertical-align: middle;
    }

    .viewer {
      height: calc(100vh - 72px);
      overflow: auto;
      background: #f3f3f3;
    }

    object {
      display: block;
      width: 3003px;
      height: 6402px;
      border: 0;
      background: white;
    }

    @media (max-width: 760px) {
      header {
        align-items: flex-start;
        flex-direction: column;
      }

      .viewer {
        height: calc(100vh - 116px);
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="title-block">
      <h1>Seamly2D Interactive Body Measurements Diagram</h1>
      <p>
        By Louie Lu
        (<a href="https://github.com/mlouielu">@mlouielu</a>).
        Hover measurements to highlight lines. Click a measurement to copy its variable name.
      </p>
    </div>

    <div class="links">
      <a
        class="github-badge"
        href="https://github.com/mlouielu/seamly2d-interactive-body-measurements-diagram"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="View source on GitHub">
        <svg class="github-icon" viewBox="0 0 16 16" aria-hidden="true">
          <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
          0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52
          -.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2
          -3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21
          2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82
          2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15
          0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
          0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013
          8.013 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/>
        </svg>
        GitHub
      </a>
    </div>
  </header>

  <main class="viewer">
    <object
      type="image/svg+xml"
      data="./Seamly2d-interactive-body-measurements.svg"
      aria-label="Interactive Seamly2D body measurements diagram">
      <p>
        Your browser could not load the SVG.
        <a href="./Seamly2d-interactive-body-measurements.svg">Open it directly</a>.
      </p>
    </object>
  </main>
</body>
</html>
