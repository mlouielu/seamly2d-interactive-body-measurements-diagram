<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Seamly2D Interactive Body Measurements Diagram</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      min-height: 72px;
      box-sizing: border-box;
      padding: 10px 16px;
      border-bottom: 1px solid #ddd;
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .title-block {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: 18px;
    }

    p {
      margin: 4px 0 0;
      color: #555;
      font-size: 14px;
    }

    .links {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .github-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border: 1px solid #ccc;
      border-radius: 999px;
      background: white;
      color: #24292f;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
    }

    .github-badge:hover {
      background: #f0f0f0;
    }

    .github-icon {
      width: 16px;
      height: 16px;
      display: inline-block;
      vertical-align: middle;
    }

    .status-bar {
      height: 36px;
      box-sizing: border-box;
      padding: 0 16px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #555;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }

    .status-bar .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
      transition: background 0.15s;
    }

    .status-bar.is-hovered .status-dot { background: #f59e0b; }
    .status-bar.is-copied .status-dot  { background: #0a8f45; }

    .status-bar .status-label {
      font-weight: 600;
      color: #111;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .status-bar .status-var {
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
      font-size: 12px;
      color: #555;
      background: #f0f0f0;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 1px 5px;
      flex-shrink: 0;
      display: none;
    }

    .status-bar.is-hovered .status-var,
    .status-bar.is-copied  .status-var { display: inline; }

    .status-bar .status-sep {
      color: #ccc;
      flex-shrink: 0;
      display: none;
    }

    .status-bar.is-hovered .status-sep,
    .status-bar.is-copied  .status-sep { display: inline; }

    .status-bar .status-hint {
      color: #999;
      font-size: 12px;
      flex-shrink: 0;
    }

    .status-bar.is-copied .status-hint {
      color: #0a8f45;
      font-weight: 600;
    }

    /* ── Section tabs (mobile only, shown by JS) ── */
    .section-tabs {
      display: none;
      overflow-x: auto;
      padding: 0 8px;
      gap: 6px;
      height: 46px;
      box-sizing: border-box;
      align-items: center;
      background: #fafafa;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .section-tabs::-webkit-scrollbar { display: none; }

    .section-tab {
      display: inline-flex;
      align-items: center;
      height: 30px;
      padding: 0 12px;
      border: 1px solid #ddd;
      border-radius: 15px;
      background: #fff;
      font-size: 12px;
      font-weight: 500;
      color: #333;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    .section-tab.is-active {
      background: #1a73e8;
      color: #fff;
      border-color: #1a73e8;
    }

    .viewer {
      flex: 1;
      min-height: 0;
      overflow: auto;
      background: #f3f3f3;
      position: relative;
    }

    object {
      display: block;
      width: 3003px;
      height: 6802px;
      border: 0;
      background: white;
    }

    /* ── Measurement list panel (mobile only, shown by JS) ── */
    .list-panel {
      display: none;
      flex-direction: column;
      background: #fff;
      border-top: 1px solid #e0e0e0;
    }

    .list-search-wrap {
      flex-shrink: 0;
      padding: 6px 10px;
      background: #fafafa;
      border-bottom: 1px solid #e8e8e8;
    }

    .list-search {
      width: 100%;
      box-sizing: border-box;
      height: 32px;
      padding: 0 10px;
      border: 1px solid #ddd;
      border-radius: 16px;
      font-size: 13px;
      font-family: inherit;
      background: #fff;
      outline: none;
      -webkit-appearance: none;
    }
    .list-search:focus { border-color: #1a73e8; }

    .list-scroll {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .list-search-section {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      padding: 8px 14px 2px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .list-loading {
      padding: 20px 16px;
      color: #999;
      font-size: 13px;
      text-align: center;
    }

    .list-item {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      gap: 8px;
      -webkit-tap-highlight-color: transparent;
    }
    .list-item:active        { background: #f5f5f5; }
    .list-item.is-highlighted { background: #fff3e0; }

    .list-item-code {
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
      font-size: 11px;
      color: #aaa;
      flex-shrink: 0;
      width: 32px;
    }

    .list-item-name {
      flex: 1;
      font-size: 13px;
      color: #111;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .list-item-var {
      font-family: ui-monospace, "SFMono-Regular", Menlo, monospace;
      font-size: 11px;
      color: #555;
      background: #f0f0f0;
      border: 1px solid #ddd;
      border-radius: 3px;
      padding: 1px 5px;
      flex-shrink: 0;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    @media (max-width: 760px) {
      header {
        min-height: unset;
        padding: 5px 10px;
        gap: 8px;
      }

      h1 {
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      p {
        display: none;
      }

      .github-label {
        display: none;
      }

      .github-badge {
        padding: 5px 7px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="title-block">
      <h1>Seamly2D Interactive Body Measurements Diagram</h1>
      <p>
        By Louie Lu
        (<a href="https://github.com/mlouielu">@mlouielu</a>).
        Hover measurements to highlight lines. Click a measurement to copy its variable name.
      </p>
    </div>

    <div class="links">
      <a
        class="github-badge"
        href="https://github.com/mlouielu/seamly2d-interactive-body-measurements-diagram"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="View source on GitHub">
        <svg class="github-icon" viewBox="0 0 16 16" aria-hidden="true">
          <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38
          0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52
          -.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2
          -3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21
          2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82
          2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15
          0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48
          0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013
          8.013 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/>
        </svg>
        <span class="github-label">GitHub</span>
      </a>
    </div>
  </header>
  <div class="status-bar" id="statusBar" aria-live="polite" aria-atomic="true">
    <span class="status-dot"></span>
    <span class="status-label" id="statusLabel"></span>
    <span class="status-var" id="statusVar"></span>
    <span class="status-sep">·</span>
    <span class="status-hint" id="statusHint">Hover or tap a measurement</span>
  </div>
  <div class="section-tabs" id="sectionTabs"></div>
  <main class="viewer">
    <object
      type="image/svg+xml"
      data="./Seamly2d-interactive-body-measurements.svg"
      aria-label="Interactive Seamly2D body measurements diagram">
      <p>
        Your browser could not load the SVG.
        <a href="./Seamly2d-interactive-body-measurements.svg">Open it directly</a>.
      </p>
    </object>
  </main>
  <div class="list-panel" id="listPanel">
    <div class="list-search-wrap">
      <input class="list-search" id="listSearch" type="search" placeholder="Search measurements…" autocomplete="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="list-scroll" id="listScroll">
      <div class="list-loading">Loading measurements…</div>
    </div>
  </div>
  <script>
  /* ── Bridge: status bar ─────────────────────────────────────────────────── */
  (function () {
    const statusBar   = document.getElementById('statusBar');
    const statusLabel = document.getElementById('statusLabel');
    const statusVar   = document.getElementById('statusVar');
    const statusHint  = document.getElementById('statusHint');
    const obj         = document.querySelector('object');

    const DEFAULT_HINT = 'Hover or tap a measurement';
    const COPY_HINT    = '✓ Copied!';

    let copyTimer  = null;
    let savedState = { state: null, label: '', variable: '', hint: DEFAULT_HINT };

    function applyState(s) {
      savedState = s;
      statusBar.className     = 'status-bar' + (s.state ? ' is-' + s.state : '');
      statusLabel.textContent = s.label    || '';
      statusVar.textContent   = s.variable || '';
      statusHint.textContent  = s.hint     || DEFAULT_HINT;
    }

    function showCopied() {
      if (copyTimer) clearTimeout(copyTimer);
      statusBar.classList.remove('is-hovered');
      statusBar.classList.add('is-copied');
      statusHint.textContent = COPY_HINT;
      copyTimer = setTimeout(function () { applyState(savedState); }, 1600);
    }

    function bridge(doc) {
      function infoFor(el, code) {
        const label    = el.getAttribute('data-measure-label') || code;
        const variable = el.getAttribute('data-measure-var') ||
          (label.match(/\(([^()]+)\)\s*$/) || [])[1] || '';
        return { label, variable };
      }

      function codesFor(el) {
        const raw = el.getAttribute('data-measures') || el.getAttribute('data-measure') || '';
        return raw.trim().split(/\s+/).filter(Boolean);
      }

      doc.querySelectorAll('.measure-definition, .measure-target').forEach(function (el) {
        const codes = codesFor(el);
        if (!codes.length) return;
        const code = codes[0];

        el.addEventListener('mouseenter', function () {
          const { label, variable } = infoFor(el, code);
          applyState({ state: 'hovered', label, variable, hint: 'Click to copy variable' });
        });

        el.addEventListener('mouseleave', function () {
          applyState({ state: null, label: '', variable: '', hint: DEFAULT_HINT });
        });

        el.addEventListener('click', function (evt) {
          evt.stopPropagation();
          const { label, variable } = infoFor(el, code);
          applyState({ state: 'hovered', label, variable, hint: 'Click to copy variable' });
          showCopied();
          history.replaceState(null, '', '#' + code);
        });
      });

      /* Highlight element matching URL hash (e.g. #H03) on desktop */
      function highlightFromHash() {
        var hash = (location.hash || '').replace('#', '').toUpperCase().trim();
        if (!/^[A-Q]\d+$/.test(hash)) return;
        var el = doc.querySelector('[data-measure="' + hash + '"],[data-measures~="' + hash + '"]');
        if (!el) return;
        el.dispatchEvent(new MouseEvent('mouseenter', { bubbles: true }));
        el.scrollIntoView({ block: 'center', behavior: 'smooth' });
      }

      highlightFromHash();
      window.addEventListener('hashchange', highlightFromHash);
    }

    function tryBridge() {
      try {
        const doc = obj.contentDocument;
        if (doc && doc.readyState === 'complete' && doc.querySelector('.measure-definition')) {
          bridge(doc);
          return;
        }
      } catch (e) {}
      setTimeout(tryBridge, 200);
    }

    window._svgBridge = { applyState: applyState };

    obj.addEventListener('load', function () { setTimeout(tryBridge, 100); });
    setTimeout(tryBridge, 500);
  })();

  /* ── Mobile: touch pan/zoom + split panel ───────────────────────────────── */
  (function () {
    if (!('ontouchstart' in window)) return;

    var SECTIONS = [
      ['A', 'A - Direct Height'], ['B', 'B - Direct Width'], ['C', 'C - Indentation'],
      ['D', 'D - Hand'],          ['E', 'E - Foot'],          ['F', 'F - Head'],
      ['G', 'G - Circ'],          ['H', 'H - Vertical'],      ['I', 'I - Horizontal'],
      ['J', 'J - Bust'],          ['K', 'K - Balance'],       ['L', 'L - Arm'],
      ['M', 'M - Leg'],           ['N', 'N - Crotch'],        ['O', 'O - Corsage'],
      ['P', 'P - Across'],        ['Q', 'Q - Dart']
    ];

    var SVG_W = 3003, SVG_H = 6802;
    var viewer      = document.querySelector('.viewer');
    var obj         = document.querySelector('object');
    var sectionTabs = document.getElementById('sectionTabs');
    var listPanel   = document.getElementById('listPanel');
    var listScroll  = document.getElementById('listScroll');
    var listSearch  = document.getElementById('listSearch');

    /* Show split panel UI */
    sectionTabs.style.display = 'flex';
    viewer.style.flex         = '3';  /* diagram takes 3 parts */
    listPanel.style.display   = 'flex';
    listPanel.style.flex      = '2';  /* list takes 2 parts  → 60/40 split */
    listPanel.style.minHeight = '0';

    /* Transform state */
    viewer.style.overflow     = 'hidden';
    obj.style.position        = 'absolute';
    obj.style.top             = '0';
    obj.style.left            = '0';
    obj.style.width           = SVG_W + 'px';
    obj.style.height          = SVG_H + 'px';
    obj.style.transformOrigin = '0 0';

    var scale = 1, tx = 0, ty = 0;

    function clamp() {
      var sw = SVG_W * scale, sh = SVG_H * scale;
      var vw = viewer.clientWidth, vh = viewer.clientHeight;
      var pad = 40;
      tx = Math.min(vw - pad, Math.max(pad - sw, tx));
      ty = Math.min(vh - pad, Math.max(pad - sh, ty));
    }

    function commit() {
      obj.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + scale + ')';
    }

    function initFit() {
      scale = Math.min(viewer.clientWidth / SVG_W, viewer.clientHeight / SVG_H);
      tx = 0; ty = 0;
      commit();
    }

    /* Wait two frames so flexbox has split the viewer/list heights before measuring */
    requestAnimationFrame(function () { requestAnimationFrame(initFit); });

    /* Transparent overlay captures all touch events on the diagram */
    var overlay = document.createElement('div');
    overlay.style.cssText = 'position:absolute;inset:0;z-index:5;touch-action:none;';
    viewer.appendChild(overlay);

    var ptrs = {};
    var panStartX, panStartY, panStartTx, panStartTy;
    var pinchDist0 = 0, pinchScale0 = 1, pinchTx0 = 0, pinchTy0 = 0, pinchCx = 0, pinchCy = 0;
    var tapX, tapY, tapTime;

    function viewerPos(touch) {
      var r = viewer.getBoundingClientRect();
      return { x: touch.clientX - r.left, y: touch.clientY - r.top };
    }

    function dist2(a, b) { var dx = a.x - b.x, dy = a.y - b.y; return Math.sqrt(dx*dx + dy*dy); }
    function mid(a, b)   { return { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 }; }

    overlay.addEventListener('touchstart', function (e) {
      e.preventDefault();
      Array.from(e.changedTouches).forEach(function (t) { ptrs[t.identifier] = viewerPos(t); });
      var ids = Object.keys(ptrs);
      if (ids.length === 1) {
        var p = ptrs[ids[0]];
        panStartX = p.x; panStartY = p.y; panStartTx = tx; panStartTy = ty;
        tapX = p.x; tapY = p.y; tapTime = Date.now();
      } else if (ids.length === 2) {
        var pts = [ptrs[ids[0]], ptrs[ids[1]]];
        pinchDist0  = dist2(pts[0], pts[1]);
        pinchScale0 = scale;
        pinchTx0 = tx; pinchTy0 = ty;
        var c = mid(pts[0], pts[1]);
        pinchCx = c.x; pinchCy = c.y;
      }
    }, { passive: false });

    overlay.addEventListener('touchmove', function (e) {
      e.preventDefault();
      Array.from(e.changedTouches).forEach(function (t) { ptrs[t.identifier] = viewerPos(t); });
      var ids = Object.keys(ptrs);
      if (ids.length === 1) {
        var p = ptrs[ids[0]];
        tx = panStartTx + (p.x - panStartX);
        ty = panStartTy + (p.y - panStartY);
        clamp(); commit();
      } else if (ids.length >= 2) {
        var pts = [ptrs[ids[0]], ptrs[ids[1]]];
        var d = dist2(pts[0], pts[1]);
        var newScale = Math.min(4, Math.max(0.15, pinchScale0 * (d / pinchDist0)));
        tx = pinchCx - (pinchCx - pinchTx0) * (newScale / pinchScale0);
        ty = pinchCy - (pinchCy - pinchTy0) * (newScale / pinchScale0);
        scale = newScale;
        clamp(); commit();
      }
    }, { passive: false });

    overlay.addEventListener('touchend', function (e) {
      e.preventDefault();
      var changed    = Array.from(e.changedTouches);
      var wasSingle  = Object.keys(ptrs).length === 1;
      changed.forEach(function (t) { delete ptrs[t.identifier]; });

      if (wasSingle && changed.length === 1) {
        var p = viewerPos(changed[0]);
        if (dist2(p, { x: tapX, y: tapY }) < 10 && Date.now() - tapTime < 400) {
          forwardTap(tapX, tapY);
        }
      }

      var rem = Object.keys(ptrs);
      if (rem.length === 1) {
        var rp = ptrs[rem[0]];
        panStartX = rp.x; panStartY = rp.y; panStartTx = tx; panStartTy = ty;
      }
    }, { passive: false });

    overlay.addEventListener('touchcancel', function (e) {
      Array.from(e.changedTouches).forEach(function (t) { delete ptrs[t.identifier]; });
    });

    /* ── Split panel data ──────────────────────────────────────────────────── */
    var sectionBBoxes       = {}; /* letter → {x,y,w,h} in SVG coords */
    var sectionMeasurements = {}; /* letter → [{code,label,variable}]  */
    var currentSection      = 'A';
    var lastTappedCode      = null;

    function getGlobalBBox(el, svgEl) {
      var bb;
      try { bb = el.getBBox(); } catch (e) { return null; }
      if (!bb || (bb.width === 0 && bb.height === 0)) return null;
      var ctm;
      try { ctm = el.getCTM(); } catch (e) { return null; }
      if (!ctm) return { x: bb.x, y: bb.y, width: bb.width, height: bb.height };
      var corners = [
        { x: bb.x,            y: bb.y            },
        { x: bb.x + bb.width, y: bb.y            },
        { x: bb.x,            y: bb.y + bb.height },
        { x: bb.x + bb.width, y: bb.y + bb.height }
      ].map(function (p) {
        var pt = svgEl.createSVGPoint();
        pt.x = p.x; pt.y = p.y;
        return pt.matrixTransform(ctm);
      });
      var xs = corners.map(function (p) { return p.x; });
      var ys = corners.map(function (p) { return p.y; });
      return {
        x:      Math.min.apply(null, xs),
        y:      Math.min.apply(null, ys),
        width:  Math.max.apply(null, xs) - Math.min.apply(null, xs),
        height: Math.max.apply(null, ys) - Math.min.apply(null, ys)
      };
    }

    function buildData(doc) {
      var svgEl    = doc.documentElement;
      var allEls   = doc.querySelectorAll('[data-measures],[data-measure]');
      var bboxAccum = {};
      var measSeen  = {};
      var measData  = {};

      allEls.forEach(function (el) {
        var raw   = el.getAttribute('data-measures') || el.getAttribute('data-measure') || '';
        var codes = raw.trim().split(/\s+/).filter(Boolean);
        if (!codes.length) return;
        var code   = codes[0];
        var letter = code[0];

        if (!measSeen[code]) {
          measSeen[code] = true;
          if (!measData[letter]) measData[letter] = [];
          measData[letter].push({
            code:     code,
            label:    el.getAttribute('data-measure-label') || code,
            variable: el.getAttribute('data-measure-var')   || ''
          });
        }

        /* Only include measure-target elements in the bbox — measure-definition
           elements are the right-side legend text and would inflate the crop. */
        if (!el.classList.contains('measure-target')) return;

        var bb = getGlobalBBox(el, svgEl);
        if (!bb) return;
        /* Use element center rather than full extent — long vertical/horizontal
           measurement lines would otherwise pull the section bbox far beyond
           the visible content cluster (e.g. H - Vertical spans full torso). */
        var cx = bb.x + bb.width  / 2;
        var cy = bb.y + bb.height / 2;
        if (!bboxAccum[letter]) {
          bboxAccum[letter] = { x1: cx, y1: cy, x2: cx, y2: cy };
        } else {
          var a = bboxAccum[letter];
          a.x1 = Math.min(a.x1, cx);
          a.y1 = Math.min(a.y1, cy);
          a.x2 = Math.max(a.x2, cx);
          a.y2 = Math.max(a.y2, cy);
        }
      });

      Object.keys(measData).forEach(function (l) {
        measData[l].sort(function (a, b) { return a.code < b.code ? -1 : 1; });
      });

      sectionMeasurements = measData;

      /* Build a map from inkscape:label → element for bbox markers. */
      var inkNS = 'http://www.inkscape.org/namespaces/inkscape';
      var labelMap = {};
      doc.querySelectorAll('[*|label]').forEach(function(el) {
        var lbl = el.getAttributeNS(inkNS, 'label') || el.getAttribute('inkscape:label');
        if (lbl) labelMap[lbl] = el;
      });

      /* Prefer explicit {letter}-bbox elements authored in the SVG; fall back
         to the computed centroid accumulation for any section missing one. */
      Object.keys(measData).forEach(function (l) {
        var marker = labelMap[l + '-bbox'];
        if (marker) {
          var bb = getGlobalBBox(marker, svgEl);
          if (bb) { sectionBBoxes[l] = { x: bb.x, y: bb.y, w: bb.width, h: bb.height }; return; }
        }
        var a = bboxAccum[l];
        if (a) sectionBBoxes[l] = { x: a.x1, y: a.y1, w: a.x2 - a.x1, h: a.y2 - a.y1 };
      });
    }

    var debugRect = null;

    function drawDebugBBox(letter) {
      try {
        var doc = obj.contentDocument;
        if (!doc) return;
        var svgEl = doc.documentElement;
        if (!debugRect) {
          debugRect = doc.createElementNS('http://www.w3.org/2000/svg', 'rect');
          debugRect.setAttribute('fill', 'none');
          debugRect.setAttribute('stroke', '#ff0000');
          debugRect.setAttribute('stroke-width', '8');
          debugRect.setAttribute('stroke-dasharray', '20 10');
          debugRect.setAttribute('pointer-events', 'none');
          svgEl.appendChild(debugRect);
        }
        var bb = sectionBBoxes[letter];
        if (!bb) { debugRect.style.display = 'none'; return; }
        debugRect.style.display = '';
        debugRect.setAttribute('x',      bb.x);
        debugRect.setAttribute('y',      bb.y);
        debugRect.setAttribute('width',  bb.w);
        debugRect.setAttribute('height', bb.h);
      } catch (e) {}
    }

    function fitSection(letter) {
      var bb = sectionBBoxes[letter];
      if (!bb) return;

      var pad = viewer.clientHeight * 0.05;
      var bx = bb.x - pad, by = bb.y - pad;
      var bw = bb.w + pad * 2, bh = bb.h + pad * 2;
      var vw = viewer.clientWidth, vh = viewer.clientHeight;
      scale = Math.min(vw / bw, vh / bh);
      tx = (vw - bw * scale) / 2 - bx * scale;
      ty = (vh - bh * scale) / 2 - by * scale;
      clamp();
      commit();
      // drawDebugBBox(letter);
    }

    var elementZoomed = false; /* true once user has tapped a list item in current section */

    function panToElement(el, svgEl) {
      var bb = getGlobalBBox(el, svgEl);
      if (!bb) return;
      var cx = bb.x + bb.width  / 2;
      var cy = bb.y + bb.height / 2;
      var sbb = sectionBBoxes[currentSection];

      if (sbb) {
        var vPad = bb.height / viewer.clientHeight + viewer.clientHeight * 0.1;
        scale = viewer.clientHeight / (sbb.h + vPad * 2);
		ty = (viewer.clientHeight - (sbb.h + vPad * 2) * scale) / 2 - (sbb.y - vPad) * scale;
      }
      elementZoomed = true;

      /* Always re-center on the element at the current scale */
      tx = viewer.clientWidth  / 2 - cx * scale;
      //ty = viewer.clientHeight / 2 - cy * scale;
      clamp();
      commit();
    }

    function buildTabs() {
      sectionTabs.innerHTML = '';
      SECTIONS.forEach(function (pair) {
        var letter = pair[0], name = pair[1];
        if (!sectionMeasurements[letter]) return;
        var btn = document.createElement('button');

        btn.className    = 'section-tab' + (letter === currentSection ? ' is-active' : '');
        btn.textContent  = name;
        btn.dataset.letter = letter;
        btn.addEventListener('click', function () { selectSection(letter); });
        sectionTabs.appendChild(btn);
      });
    }

    function makeListRow(m) {
      var displayName = m.label
        .replace(/^[A-Z]\d+\s*[-–]\s*/, '')
        .replace(/\s*\([^)]+\)\s*$/, '');

      var row = document.createElement('div');
      row.className    = 'list-item';
      row.dataset.code = m.code;

      var codeEl = document.createElement('span');
      codeEl.className   = 'list-item-code';
      codeEl.textContent = m.code;

      var nameEl = document.createElement('span');
      nameEl.className   = 'list-item-name';
      nameEl.textContent = displayName;

      row.appendChild(codeEl);
      row.appendChild(nameEl);

      if (m.variable) {
        var varEl = document.createElement('span');
        varEl.className   = 'list-item-var';
        varEl.textContent = m.variable;
        row.appendChild(varEl);
      }

      row.addEventListener('click', function () { tapFromList(m.code); });
      return row;
    }

    function buildList(letter) {
      listScroll.innerHTML = '';
      var items = sectionMeasurements[letter] || [];
      items.forEach(function (m) { listScroll.appendChild(makeListRow(m)); });
    }

    function buildSearchResults(query) {
      listScroll.innerHTML = '';
      var q = query.toLowerCase();
      var grouped = {};
      SECTIONS.forEach(function (pair) {
        var letter = pair[0];
        var items  = sectionMeasurements[letter] || [];
        items.forEach(function (m) {
          var haystack = (m.code + ' ' + m.label + ' ' + m.variable).toLowerCase();
          if (haystack.indexOf(q) === -1) return;
          if (!grouped[letter]) grouped[letter] = [];
          grouped[letter].push(m);
        });
      });

      var hasResults = false;
      SECTIONS.forEach(function (pair) {
        var letter = pair[0], name = pair[1];
        var items = grouped[letter];
        if (!items || !items.length) return;
        hasResults = true;
        var hdr = document.createElement('div');
        hdr.className   = 'list-search-section';
        hdr.textContent = name;
        listScroll.appendChild(hdr);
        items.forEach(function (m) { listScroll.appendChild(makeListRow(m)); });
      });

      if (!hasResults) {
        var empty = document.createElement('div');
        empty.className   = 'list-loading';
        empty.textContent = 'No results';
        listScroll.appendChild(empty);
      }
    }

    function highlightListItem(code) {
      var found = null;
      listScroll.querySelectorAll('.list-item').forEach(function (el) {
        var active = el.dataset.code === code;
        el.classList.toggle('is-highlighted', active);
        if (active) found = el;
      });
      if (found) found.scrollIntoView({ block: 'nearest' });
    }

    function setHash(hash) {
      history.replaceState(null, '', '#' + hash);
    }

    function switchTabTo(letter) {
      if (letter === currentSection) return;
      currentSection = letter;
      elementZoomed  = false;
      sectionTabs.querySelectorAll('.section-tab').forEach(function (btn) {
        btn.classList.toggle('is-active', btn.dataset.letter === letter);
      });
      var active = sectionTabs.querySelector('.is-active');
      if (active) active.scrollIntoView({ block: 'nearest', inline: 'center' });
    }

    function tapFromList(code) {
      var letter = code[0];
      /* Switch active tab without rebuilding the list (search results must stay) */
      switchTabTo(letter);
      setHash(code);
      var isSecondTap = (code === lastTappedCode);
      lastTappedCode = isSecondTap ? null : code;
      try {
        var doc = obj.contentDocument;
        if (!doc) return;
        /* Find the first geometric measure-target (not a text/legend element) */
        var el = null;
        var candidates = doc.querySelectorAll('[data-measure="' + code + '"],[data-measures~="' + code + '"]');
        for (var i = 0; i < candidates.length; i++) {
          var c = candidates[i];
          var t = c.tagName.toLowerCase();
          if (c.classList.contains('measure-target') && t !== 'text' && t !== 'tspan') {
            el = c; break;
          }
        }
        if (el) {
          if (isSecondTap) {
            el.dispatchEvent(new MouseEvent('click', { bubbles: true }));
          } else {
            el.dispatchEvent(new MouseEvent('mouseenter', { bubbles: true }));
            if (window._svgBridge) {
              var label    = el.getAttribute('data-measure-label') || code;
              var variable = el.getAttribute('data-measure-var')   || '';
              window._svgBridge.applyState({ state: 'hovered', label: label, variable: variable, hint: 'Tap again to copy' });
            }
            panToElement(el, doc.documentElement);
          }
        }
      } catch (err) {}
      highlightListItem(code);
    }

    function selectSection(letter) {
      currentSection = letter;
      lastTappedCode = null;
      elementZoomed  = false;
      listSearch.value = '';
      sectionTabs.querySelectorAll('.section-tab').forEach(function (btn) {
        btn.classList.toggle('is-active', btn.dataset.letter === letter);
      });
      var active = sectionTabs.querySelector('.is-active');
      if (active) active.scrollIntoView({ block: 'nearest', inline: 'center' });
      buildList(letter);
      fitSection(letter);
      setHash(letter);
    }

    function forwardTap(vx, vy) {
      var docX = (vx - tx) / scale;
      var docY = (vy - ty) / scale;
      try {
        var doc = obj.contentDocument;
        if (!doc) return;
        var el = doc.elementFromPoint(docX, docY);
        while (el && el !== doc.documentElement) {
          if (el.classList &&
              (el.classList.contains('measure-definition') ||
               el.classList.contains('measure-target'))) {
            var code = (el.getAttribute('data-measures') || el.getAttribute('data-measure') || '')
                        .trim().split(/\s+/)[0];
            var isSecondTap = (code && code === lastTappedCode);
            lastTappedCode = isSecondTap ? null : code;

            if (isSecondTap) {
              el.dispatchEvent(new MouseEvent('click', { bubbles: true }));
            } else {
              el.dispatchEvent(new MouseEvent('mouseenter', { bubbles: true }));
              if (window._svgBridge && code) {
                var label    = el.getAttribute('data-measure-label') || code;
                var variable = el.getAttribute('data-measure-var')   || '';
                window._svgBridge.applyState({ state: 'hovered', label: label, variable: variable, hint: 'Tap again to copy' });
              }
              if (code) {
                var letter = code[0];
                if (letter !== currentSection) selectSection(letter);
                highlightListItem(code);
              }
            }
            return;
          }
          el = el.parentElement;
        }
      } catch (err) {}
    }

    function initSplitPanel(doc) {
      buildData(doc);
      buildTabs();

      /* Restore from URL hash: #A → section, #A01 → specific measurement */
      var initialHash = (location.hash || '').replace('#', '').toUpperCase().trim();
      var initialCode = null;
      if (/^[A-Q]\d+$/.test(initialHash)) {
        initialCode = initialHash;
        selectSection(initialHash[0]);
      } else if (/^[A-Q]$/.test(initialHash) && sectionMeasurements[initialHash]) {
        selectSection(initialHash);
      } else {
        selectSection('A');
      }
      if (initialCode) {
        /* Defer so the SVG layout settles first */
        setTimeout(function () { tapFromList(initialCode); }, 200);
      }

      listSearch.addEventListener('input', function () {
        var q = listSearch.value.trim();
        if (q) {
          buildSearchResults(q);
        } else {
          buildList(currentSection);
        }
      });
    }

    function tryInit() {
      try {
        var doc = obj.contentDocument;
        if (doc && doc.readyState === 'complete' && doc.querySelector('.measure-definition')) {
          initSplitPanel(doc);
          return;
        }
      } catch (e) {}
      setTimeout(tryInit, 200);
    }

    obj.addEventListener('load', function () { setTimeout(tryInit, 100); });
    setTimeout(tryInit, 500);
  })();
  </script>
</body>
</html>
